// Plate calculator - returns plates per side for a barbell lift
function calcPlates(totalKg,barKg){
  const bar=barKg||20;
  if(!totalKg||totalKg<=bar)return null;
  let perSide=(totalKg-bar)/2;
  if(perSide<=0)return null;
  const plates=[25,20,15,10,5,2.5,1.25];
  const result=[];
  for(const p of plates){while(perSide>=p-0.01){result.push(p);perSide-=p;if(perSide<0.1)break}}
  if(perSide>0.5)return null;// impossible with standard plates
  return result;
}
